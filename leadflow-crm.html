<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAX Group CRM — Gestión de Leads Facebook Ads</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn  { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn { from{opacity:0;transform:translateX(120%)} to{opacity:1;transform:translateX(0)} }
    .anim-fade  { animation: fadeIn  .2s ease; }
    .anim-toast { animation: slideIn .25s ease; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    .drag-active { opacity:.45 !important; transform:scale(.97); }
    .drop-target { outline:2px dashed #6366f1 !important; background:#eef2ff !important; }

    /* ── PDF / Print styles ── */
    @media print {
      body, html { background: white !important; height: auto !important; overflow: visible !important; }
      #print-header { display: flex !important; }
      .no-print { display: none !important; }
      /* Hide everything except the report section */
      aside, .sidebar-hide { display: none !important; }
      /* Let the report fill the page */
      #print-area {
        position: static !important;
        width: 100% !important;
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
        overflow: visible !important;
      }
      /* Ensure all sections break nicely */
      #print-area > div { break-inside: avoid; margin-bottom: 16px; }
      /* Override flex height constraints */
      div[class*="flex"] { height: auto !important; overflow: visible !important; }
      main { overflow: visible !important; height: auto !important; }
      @page { margin: 1.5cm; size: A4 portrait; }
    }
    #print-header { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════ ERROR BOUNDARY ═════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
        <div className="bg-slate-800 border border-slate-700 rounded-2xl p-8 max-w-sm w-full text-center">
          <div className="text-4xl mb-4">⚠️</div>
          <h2 className="text-white font-bold text-lg mb-2">Algo salió mal</h2>
          <p className="text-slate-400 text-sm mb-6">Hubo un error al cargar la aplicación. Intentá recargar la página.</p>
          <button onClick={() => window.location.reload()}
            className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-xl text-sm transition-all">
            🔄 Recargar
          </button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

/* ═══════════════════════════ CONSTANTS ═══════════════════════════ */

const STAGES = [
  { id:'new',       label:'Nuevo Lead',        color:'blue',   pill:'bg-blue-100 text-blue-700 border-blue-200',   bar:'bg-blue-500'   },
  { id:'contacted', label:'Contactado',         color:'yellow', pill:'bg-yellow-100 text-yellow-700 border-yellow-200', bar:'bg-yellow-500' },
  { id:'following', label:'En Seguimiento',     color:'orange', pill:'bg-orange-100 text-orange-700 border-orange-200', bar:'bg-orange-500' },
  { id:'proposal',  label:'Propuesta Enviada',  color:'purple', pill:'bg-purple-100 text-purple-700 border-purple-200', bar:'bg-purple-500' },
  { id:'converted', label:'Convertido',         color:'green',  pill:'bg-green-100 text-green-700 border-green-200',  bar:'bg-green-500'  },
  { id:'lost',      label:'Perdido',            color:'red',    pill:'bg-red-100 text-red-600 border-red-200',       bar:'bg-red-400'    },
];
const STAGE = Object.fromEntries(STAGES.map(s => [s.id, s]));

const SOURCES = [
  'Facebook Ads', 'Instagram Ads', 'Facebook + Instagram',
  'WhatsApp', 'Referido', 'Orgánico', 'Otro',
];

// Shared input style (defined here to avoid re-creating inside components, which causes focus loss)
const inputCls = "w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white";

// Field wrapper must live outside any component to prevent remounting on every keystroke
function Field({ label, children, span }) {
  return (
    <div className={span ? 'col-span-full' : ''}>
      <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">{label}</label>
      {children}
    </div>
  );
}

const todayISO = () => new Date().toISOString().split('T')[0];
const uid      = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

const fmtDate  = d => {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
};
const daysUntil  = d => d ? Math.ceil((new Date(d) - new Date(todayISO())) / 86400000) : null;
const isOverdue  = d => d && d < todayISO();
const isToday    = d => d === todayISO();
const fmtMoney   = n => n >= 1000 ? `$${(n / 1000).toFixed(n % 1000 === 0 ? 0 : 1)}k` : `$${n}`;

/* ═══════════════════════════ SAMPLE DATA ════════════════════════ */

const SAMPLES = [
  { id:uid(), name:'María García',    phone:'5491123456789', email:'maria@email.com',  source:'Facebook Ads',          campaign:'Promo Verano 2026',   adSet:'Mujeres 25-35',   stage:'new',       notes:'Interesada en el plan premium. Dejó datos en formulario FB.', createdAt:'2026-03-28', followUpDate:'2026-04-03', value:15000 },
  { id:uid(), name:'Carlos López',    phone:'5491187654321', email:'carlos@email.com', source:'Instagram Ads',          campaign:'Retargeting Marzo',   adSet:'Hombres 30-45',   stage:'contacted', notes:'Llamó ayer, quiere info de precios.',                          createdAt:'2026-03-29', followUpDate:'2026-04-02', value:8000  },
  { id:uid(), name:'Ana Martínez',    phone:'5491145678901', email:'ana@email.com',    source:'Facebook Ads',          campaign:'Promo Verano 2026',   adSet:'General',          stage:'following', notes:'Enviamos propuesta por WhatsApp. Esperando confirmación.',     createdAt:'2026-03-30', followUpDate:'2026-04-04', value:22000 },
  { id:uid(), name:'Juan Rodríguez',  phone:'5491198765432', email:'juan@email.com',   source:'Facebook Ads',          campaign:'Lanzamiento Abril',   adSet:'Lookalike 1%',     stage:'proposal',  notes:'Propuesta enviada por email. Tiene dudas sobre el precio.',   createdAt:'2026-04-01', followUpDate:'2026-04-05', value:35000 },
  { id:uid(), name:'Laura Torres',    phone:'5491156789012', email:'laura@email.com',  source:'Instagram Ads',          campaign:'Retargeting Marzo',   adSet:'Mujeres 18-25',    stage:'converted', notes:'Cerrado. Pagó el 50% de adelanto.',                            createdAt:'2026-03-25', followUpDate:'',           value:18000 },
  { id:uid(), name:'Pedro Sánchez',   phone:'5491134567890', email:'pedro@email.com',  source:'Facebook Ads',          campaign:'Promo Verano 2026',   adSet:'Hombres 25-40',    stage:'lost',      notes:'No contestó 3 veces. Descartado.',                             createdAt:'2026-03-20', followUpDate:'',           value:0     },
  { id:uid(), name:'Sofía Jiménez',   phone:'5491167890123', email:'sofia@email.com',  source:'Facebook + Instagram',  campaign:'Awareness Abril',     adSet:'Broad',            stage:'new',       notes:'Dejó datos en formulario de Facebook.',                        createdAt:'2026-04-01', followUpDate:'2026-04-02', value:12000 },
  { id:uid(), name:'Diego Fernández', phone:'5491178901234', email:'diego@email.com',  source:'Facebook Ads',          campaign:'Lanzamiento Abril',   adSet:'Intereses Tech',   stage:'contacted', notes:'WhatsApp enviado, esperando respuesta.',                        createdAt:'2026-04-02', followUpDate:'2026-04-03', value:9500  },
];

// localStorage (fast first paint, offline fallback)
const loadLeads = () => {
  try { const s = localStorage.getItem('lf_leads'); return s ? JSON.parse(s) : SAMPLES; }
  catch { return SAMPLES; }
};
const cacheLeads = leads => { try { localStorage.setItem('lf_leads', JSON.stringify(leads)); } catch{} };

// REST API helpers (server-side persistence + Make webhook sync)
const api = {
  getLeads:    ()     => fetch('/api/leads').then(r => r.json()),
  upsertLead:  lead   => fetch('/api/leads', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(lead) }).then(r => r.json()),
  deleteLead:  id     => fetch(`/api/leads/${id}`, { method:'DELETE' }).then(r => r.json()),
};

/* ═══════════════════════════ SMALL COMPONENTS ═══════════════════ */

function StagePill({ stageId, sm }) {
  const s = STAGE[stageId] || STAGES[0];
  return (
    <span className={`inline-flex items-center border rounded-full font-medium whitespace-nowrap
      ${sm ? 'text-xs px-2 py-0.5' : 'text-sm px-3 py-1'} ${s.pill}`}>
      {s.label}
    </span>
  );
}

function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
  const bg = { success:'bg-emerald-600', error:'bg-red-600', info:'bg-indigo-600' }[type] || 'bg-indigo-600';
  const icon = { success:'✓', error:'✗', info:'ℹ' }[type] || 'ℹ';
  return (
    <div className={`anim-toast fixed bottom-6 right-6 z-50 flex items-center gap-3 px-5 py-3 rounded-xl text-white shadow-2xl ${bg}`}>
      <span className="text-lg font-bold">{icon}</span>
      <span className="text-sm font-medium">{msg}</span>
      <button onClick={onClose} className="ml-2 opacity-70 hover:opacity-100 text-lg leading-none">✕</button>
    </div>
  );
}

function ContactBtns({ lead }) {
  const waNum = (lead.phone || '').replace(/\D/g, '');
  const waMsg = encodeURIComponent(`Hola ${lead.name}, te contactamos por tu consulta. ¿Cómo estás?`);
  return (
    <div className="flex gap-1" onClick={e => e.stopPropagation()}>
      {waNum && (
        <a href={`https://wa.me/${waNum}?text=${waMsg}`} target="_blank" rel="noopener"
           title="WhatsApp" className="p-1.5 rounded-lg bg-green-50 hover:bg-green-100 text-green-700 text-sm transition-colors">💬</a>
      )}
      {lead.phone && (
        <a href={`tel:${lead.phone}`} title="Llamar"
           className="p-1.5 rounded-lg bg-blue-50 hover:bg-blue-100 text-blue-700 text-sm transition-colors">📞</a>
      )}
      {lead.email && (
        <a href={`mailto:${lead.email}?subject=Consulta`} title="Email"
           className="p-1.5 rounded-lg bg-violet-50 hover:bg-violet-100 text-violet-700 text-sm transition-colors">✉️</a>
      )}
    </div>
  );
}

function Avatar({ name, size = 'md' }) {
  const sz = size === 'sm' ? 'w-7 h-7 text-xs' : 'w-9 h-9 text-sm';
  return (
    <div className={`${sz} rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold flex-shrink-0`}>
      {(name || '?').charAt(0).toUpperCase()}
    </div>
  );
}

/* ═══════════════════════════ LEAD MODAL ════════════════════════ */

function LeadModal({ lead, onSave, onClose }) {
  const isNew = !lead?.id;
  const [form, setForm] = useState(() => lead?.id ? { ...lead } : {
    name: '', phone: '', email: '', source: 'Facebook Ads',
    campaign: '', adSet: '', stage: 'new', notes: '',
    createdAt: todayISO(), followUpDate: todayISO(), value: '',
  });

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSubmit = e => {
    e.preventDefault();
    if (!form.name.trim()) return;
    onSave({ ...form, id: form.id || uid() });
  };

  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center bg-black/50 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-white w-full max-w-2xl mx-4 rounded-2xl shadow-2xl anim-fade max-h-[92vh] overflow-y-auto"
           onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-5 border-b sticky top-0 bg-white z-10">
          <h2 className="text-lg font-bold text-slate-800">
            {isNew ? '➕ Agregar Nuevo Lead' : `✏️ Editar — ${lead.name}`}
          </h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-2xl leading-none w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 transition-colors">✕</button>
        </div>

        <form onSubmit={handleSubmit} className="p-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
          <Field label="Nombre completo *" span>
            <input required value={form.name} onChange={e => set('name', e.target.value)}
              className={inputCls} placeholder="Ej: María García" />
          </Field>

          <Field label="Teléfono / WhatsApp">
            <input value={form.phone} onChange={e => set('phone', e.target.value)}
              className={inputCls} placeholder="5491100000000" />
          </Field>

          <Field label="Email">
            <input type="email" value={form.email} onChange={e => set('email', e.target.value)}
              className={inputCls} placeholder="email@ejemplo.com" />
          </Field>

          <Field label="Fuente">
            <select value={form.source} onChange={e => set('source', e.target.value)} className={inputCls}>
              {SOURCES.map(s => <option key={s}>{s}</option>)}
            </select>
          </Field>

          <Field label="Campaña">
            <input value={form.campaign} onChange={e => set('campaign', e.target.value)}
              className={inputCls} placeholder="Nombre de la campaña" />
          </Field>

          <Field label="Conjunto de anuncios">
            <input value={form.adSet} onChange={e => set('adSet', e.target.value)}
              className={inputCls} placeholder="Ad Set o segmentación" />
          </Field>

          <Field label="Valor potencial ($)">
            <input type="number" min="0" value={form.value} onChange={e => set('value', e.target.value)}
              className={inputCls} placeholder="0" />
          </Field>

          <Field label="Etapa del pipeline">
            <select value={form.stage} onChange={e => set('stage', e.target.value)} className={inputCls}>
              {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </Field>

          <Field label="Próximo seguimiento">
            <input type="date" value={form.followUpDate} onChange={e => set('followUpDate', e.target.value)}
              className={inputCls} />
          </Field>

          <Field label="Fecha de ingreso">
            <input type="date" value={form.createdAt} onChange={e => set('createdAt', e.target.value)}
              className={inputCls} />
          </Field>

          <Field label="Observaciones" span>
            <textarea value={form.notes} onChange={e => set('notes', e.target.value)} rows={3}
              className={`${inputCls} resize-none`}
              placeholder="Observaciones, historial de contacto, detalles importantes..." />
          </Field>

          <div className="col-span-full flex justify-end gap-3 pt-2 border-t">
            <button type="button" onClick={onClose}
              className="px-5 py-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm font-medium transition-colors">
              Cancelar
            </button>
            <button type="submit"
              className="px-6 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold transition-colors shadow-sm">
              {isNew ? '✓ Agregar Lead' : '✓ Guardar Cambios'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ═══════════════════════════ DASHBOARD ══════════════════════════ */

function Dashboard({ leads, onEdit, onOpenNew, goTo }) {
  const total     = leads.length;
  const converted = leads.filter(l => l.stage === 'converted').length;
  const active    = leads.filter(l => !['converted','lost'].includes(l.stage)).length;
  const convRate  = total ? Math.round(converted / total * 100) : 0;
  const potVal    = leads.filter(l => l.stage !== 'lost').reduce((s, l) => s + (+l.value || 0), 0);

  const overdueLeads = leads.filter(l => isOverdue(l.followUpDate) && !['converted','lost'].includes(l.stage));
  const todayLeads   = leads.filter(l => isToday(l.followUpDate)   && !['converted','lost'].includes(l.stage));
  const recent       = [...leads].sort((a, b) => b.createdAt.localeCompare(a.createdAt)).slice(0, 6);
  const stageCounts  = Object.fromEntries(STAGES.map(s => [s.id, leads.filter(l => l.stage === s.id).length]));

  return (
    <div className="p-4 sm:p-6 space-y-4 sm:space-y-6 anim-fade">
      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-slate-800">Dashboard</h1>
          <p className="text-sm text-slate-500 mt-0.5">{fmtDate(todayISO())} — Resumen de tu pipeline</p>
        </div>
        <button onClick={onOpenNew}
          className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-colors shadow-sm flex items-center gap-1.5">
          ＋ Nuevo Lead
        </button>
      </div>

      {/* Overdue alert */}
      {overdueLeads.length > 0 && (
        <div className="bg-red-50 border border-red-200 rounded-xl p-4 flex items-center gap-3 cursor-pointer hover:bg-red-100 transition-colors"
             onClick={() => goTo('reminders')}>
          <span className="text-2xl">🚨</span>
          <div>
            <span className="font-semibold text-red-700">
              {overdueLeads.length} lead{overdueLeads.length !== 1 ? 's' : ''} con seguimiento vencido
            </span>
            <span className="text-red-600 text-sm"> — hacé clic para ver →</span>
          </div>
        </div>
      )}

      {/* Stats cards */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {[
          { label:'Total Leads',     value: total,                    sub:'registrados',            bg:'bg-indigo-50  text-indigo-700',  icon:'👥' },
          { label:'En Pipeline',     value: active,                   sub:'activos en proceso',     bg:'bg-blue-50    text-blue-700',    icon:'🔄' },
          { label:'Tasa conversión', value: `${convRate}%`,           sub:`${converted} convertidos`, bg:'bg-emerald-50 text-emerald-700', icon:'✅' },
          { label:'Valor potencial', value: potVal ? fmtMoney(potVal) : '$0', sub:'suma pipeline activo', bg:'bg-amber-50   text-amber-700',   icon:'💰' },
        ].map(({ label, value, sub, bg, icon }) => (
          <div key={label} className={`rounded-xl p-5 border border-current/10 ${bg}`}>
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-semibold uppercase tracking-wide opacity-60">{label}</span>
              <span className="text-xl">{icon}</span>
            </div>
            <div className="text-2xl font-bold">{value}</div>
            <div className="text-xs opacity-50 mt-0.5">{sub}</div>
          </div>
        ))}
      </div>

      <div className="grid lg:grid-cols-5 gap-4">
        {/* Pipeline bars */}
        <div className="lg:col-span-3 bg-white border rounded-xl p-5">
          <h3 className="font-semibold text-slate-700 mb-4">Leads por Etapa</h3>
          <div className="space-y-3.5">
            {STAGES.map(s => {
              const count = stageCounts[s.id] || 0;
              const pct   = total ? Math.round(count / total * 100) : 0;
              return (
                <div key={s.id} className="flex items-center gap-3">
                  <span className="text-xs text-slate-500 w-36 truncate">{s.label}</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
                    <div className={`h-full rounded-full transition-all duration-700 ${s.bar}`} style={{ width: `${pct}%` }} />
                  </div>
                  <span className="text-xs font-semibold text-slate-600 w-14 text-right">{count} ({pct}%)</span>
                </div>
              );
            })}
          </div>
        </div>

        {/* Reminders panel */}
        <div className="lg:col-span-2 bg-white border rounded-xl p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold text-slate-700">Recordatorios</h3>
            <button onClick={() => goTo('reminders')} className="text-xs text-indigo-600 hover:underline">Ver todos →</button>
          </div>
          {overdueLeads.length === 0 && todayLeads.length === 0 ? (
            <div className="text-center py-6 text-slate-400 text-sm">
              <div className="text-3xl mb-2">✓</div>
              Sin recordatorios pendientes
            </div>
          ) : (
            <div className="space-y-2">
              {[...overdueLeads, ...todayLeads].slice(0, 5).map(l => (
                <div key={l.id} onClick={() => onEdit(l)}
                  className={`flex items-center gap-3 p-2.5 rounded-lg cursor-pointer hover:shadow-sm transition-all
                    ${isOverdue(l.followUpDate) ? 'bg-red-50 border border-red-100' : 'bg-amber-50 border border-amber-100'}`}>
                  <span className="text-base">{isOverdue(l.followUpDate) ? '⚠️' : '📅'}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-slate-700 truncate">{l.name}</div>
                    <div className={`text-xs ${isOverdue(l.followUpDate) ? 'text-red-500' : 'text-amber-600'}`}>
                      {isOverdue(l.followUpDate) ? `Vencido — ${fmtDate(l.followUpDate)}` : 'Contactar hoy'}
                    </div>
                  </div>
                  <StagePill stageId={l.stage} sm />
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Recent leads */}
      <div className="bg-white border rounded-xl p-5">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-semibold text-slate-700">Leads Recientes</h3>
          <button onClick={() => goTo('leads')} className="text-xs text-indigo-600 hover:underline">Ver todos →</button>
        </div>
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-2">
          {recent.map(l => (
            <div key={l.id} onClick={() => onEdit(l)}
              className="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-50 cursor-pointer transition-colors border border-slate-100">
              <Avatar name={l.name} />
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-slate-800 truncate">{l.name}</div>
                <div className="text-xs text-slate-400 truncate">{l.campaign || l.source}</div>
              </div>
              <StagePill stageId={l.stage} sm />
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════ LEADS TABLE ════════════════════════ */

function LeadsView({ leads, onEdit, onDelete, onStageChange, showToast }) {
  const [search,      setSearch]      = useState('');
  const [filterStage, setFilterStage] = useState('all');
  const [filterSrc,   setFilterSrc]   = useState('all');
  const [sortCol,     setSortCol]     = useState('createdAt');
  const [sortDir,     setSortDir]     = useState('desc');

  const toggleSort = col => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('desc'); }
  };

  const filtered = leads
    .filter(l => filterStage === 'all' || l.stage === filterStage)
    .filter(l => filterSrc   === 'all' || l.source === filterSrc)
    .filter(l => {
      if (!search) return true;
      const q = search.toLowerCase();
      return [l.name, l.email, l.phone, l.campaign, l.source, l.adSet].some(v => (v || '').toLowerCase().includes(q));
    })
    .sort((a, b) => {
      let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
      if (sortCol === 'value') { va = +va; vb = +vb; }
      const c = va < vb ? -1 : va > vb ? 1 : 0;
      return sortDir === 'asc' ? c : -c;
    });

  const exportCSV = () => {
    const cols  = ['name','phone','email','source','campaign','adSet','stage','value','createdAt','followUpDate','notes'];
    const heads = ['Nombre','Teléfono','Email','Fuente','Campaña','Ad Set','Etapa','Valor','Fecha entrada','Próx. contacto','Notas'];
    const rows  = filtered.map(l => cols.map(c => `"${(l[c]||'').toString().replace(/"/g,'""')}"`).join(','));
    const csv   = [heads.join(','), ...rows].join('\n');
    const a     = document.createElement('a');
    a.href      = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
    a.download  = `leads_${todayISO()}.csv`;
    a.click();
    showToast('CSV exportado correctamente', 'success');
  };

  const Th = ({ col, children }) => (
    <th onClick={() => toggleSort(col)}
      className="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide cursor-pointer hover:text-slate-700 select-none whitespace-nowrap">
      {children} {sortCol === col ? (sortDir === 'asc' ? '↑' : '↓') : <span className="opacity-25">↕</span>}
    </th>
  );

  return (
    <div className="p-4 sm:p-6 anim-fade">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold text-slate-800">Todos los Leads</h1>
          <p className="text-sm text-slate-500 mt-0.5">
            {filtered.length} lead{filtered.length !== 1 ? 's' : ''}
            {filtered.length !== leads.length ? ` de ${leads.length}` : ''}
          </p>
        </div>
        <div className="flex gap-2 flex-wrap">
          <button onClick={exportCSV}
            className="border border-slate-200 bg-white hover:bg-slate-50 px-4 py-2 rounded-xl text-sm font-medium text-slate-600 transition-colors">
            ↓ Exportar CSV
          </button>
          <button onClick={() => onEdit(null)}
            className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors shadow-sm">
            ＋ Nuevo Lead
          </button>
        </div>
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-2.5 mb-4">
        <input value={search} onChange={e => setSearch(e.target.value)}
          placeholder="🔍 Buscar nombre, email, teléfono, campaña..."
          className="border border-slate-200 bg-white rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 min-w-72" />
        <select value={filterStage} onChange={e => setFilterStage(e.target.value)}
          className="border border-slate-200 bg-white rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="all">Todas las etapas</option>
          {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
        <select value={filterSrc} onChange={e => setFilterSrc(e.target.value)}
          className="border border-slate-200 bg-white rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="all">Todas las fuentes</option>
          {SOURCES.map(s => <option key={s}>{s}</option>)}
        </select>
      </div>

      <div className="bg-white rounded-xl border overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm min-w-[640px]">
            <thead>
              <tr className="bg-slate-50 border-b">
                <Th col="name">Nombre</Th>
                <Th col="source">Fuente</Th>
                <Th col="campaign">Campaña</Th>
                <Th col="stage">Etapa</Th>
                <Th col="value">Valor</Th>
                <Th col="followUpDate">Próx. Contacto</Th>
                <th className="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide text-center">Contactar</th>
                <th className="w-8"></th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {filtered.length === 0 ? (
                <tr><td colSpan={8} className="text-center py-16 text-slate-400">
                  <div className="text-4xl mb-2">🔍</div>
                  No se encontraron leads
                </td></tr>
              ) : filtered.map(l => {
                const over  = isOverdue(l.followUpDate) && !['converted','lost'].includes(l.stage);
                const tod   = isToday(l.followUpDate)   && !['converted','lost'].includes(l.stage);
                return (
                  <tr key={l.id} onClick={() => onEdit(l)}
                    className="hover:bg-slate-50 cursor-pointer transition-colors">
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2.5">
                        <Avatar name={l.name} size="sm" />
                        <div>
                          <div className="font-semibold text-slate-800">{l.name}</div>
                          <div className="text-xs text-slate-400">{l.email || l.phone}</div>
                        </div>
                      </div>
                    </td>
                    <td className="px-4 py-3 text-xs text-slate-500 whitespace-nowrap">{l.source}</td>
                    <td className="px-4 py-3 text-xs text-slate-500 max-w-xs truncate">{l.campaign || '—'}</td>
                    <td className="px-4 py-3"><StagePill stageId={l.stage} sm /></td>
                    <td className="px-4 py-3 text-xs font-semibold text-slate-600 whitespace-nowrap">
                      {l.value ? `$${Number(l.value).toLocaleString('es')}` : '—'}
                    </td>
                    <td className="px-4 py-3 whitespace-nowrap">
                      <span className={`text-xs font-medium ${over ? 'text-red-600' : tod ? 'text-amber-600' : 'text-slate-500'}`}>
                        {over && '⚠ '}{tod && '📅 '}{fmtDate(l.followUpDate)}
                      </span>
                    </td>
                    <td className="px-4 py-3" onClick={e => e.stopPropagation()}>
                      <ContactBtns lead={l} />
                    </td>
                    <td className="px-4 py-3 text-center" onClick={e => e.stopPropagation()}>
                      <button onClick={() => { if (window.confirm(`¿Eliminar a "${l.name}"?`)) onDelete(l.id); }}
                        className="text-slate-300 hover:text-red-500 transition-colors text-base leading-none w-6 h-6 flex items-center justify-center rounded hover:bg-red-50">✕</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════ PIPELINE ═══════════════════════════ */

function PipelineView({ leads, onEdit, onDelete, onStageChange, showToast }) {
  const [dragging,  setDragging]  = useState(null);
  const [dragOver,  setDragOver]  = useState(null);
  const [filter,    setFilter]    = useState('');
  const [movingId,  setMovingId]  = useState(null); // id del lead con picker de stage abierto

  // Touch drag refs
  const touchLead   = useRef(null);
  const touchStage  = useRef(null);

  const filtered = filter
    ? leads.filter(l => l.name.toLowerCase().includes(filter.toLowerCase()) ||
                        (l.campaign || '').toLowerCase().includes(filter.toLowerCase()))
    : leads;

  const byStage = Object.fromEntries(STAGES.map(s => [s.id, filtered.filter(l => l.stage === s.id)]));

  return (
    <div className="p-4 sm:p-6 anim-fade">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold text-slate-800">Pipeline de Ventas</h1>
          <p className="text-sm text-slate-500 mt-0.5">Arrastrá las tarjetas o tocá ⇄ para cambiar de etapa</p>
        </div>
        <div className="flex gap-2">
          <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="Filtrar leads..."
            className="border border-slate-200 bg-white rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          <button onClick={() => onEdit(null)}
            className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors shadow-sm">
            ＋ Nuevo Lead
          </button>
        </div>
      </div>

      <div className="flex gap-3 overflow-x-auto pb-4" style={{ minHeight: '72vh' }}>
        {STAGES.map(stage => {
          const stageLeads = byStage[stage.id] || [];
          const isTarget   = dragOver === stage.id;
          return (
            <div key={stage.id}
              data-stage-id={stage.id}
              onDragOver={e => { e.preventDefault(); setDragOver(stage.id); }}
              onDrop={e => {
                e.preventDefault();
                if (dragging && dragging.stage !== stage.id) {
                  onStageChange(dragging.id, stage.id);
                  showToast(`${dragging.name} → ${stage.label}`, 'success');
                }
                setDragging(null); setDragOver(null);
              }}
              onDragLeave={() => setDragOver(null)}
              className={`flex-shrink-0 w-62 flex flex-col rounded-xl transition-all duration-150
                ${isTarget ? 'drop-target' : 'bg-slate-100'}`}
              style={{ width: '240px' }}>

              {/* Column header */}
              <div className="p-3 flex items-center justify-between">
                <div className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded-lg ${stage.pill} border`}>
                  {stage.label}
                </div>
                <span className="bg-white border text-xs font-bold px-2 py-0.5 rounded-full text-slate-600">
                  {stageLeads.length}
                </span>
              </div>

              {/* Cards */}
              <div className="flex-1 px-2 pb-2 space-y-2 overflow-y-auto" style={{ maxHeight: 'calc(100vh - 200px)' }}>
                {stageLeads.map(lead => {
                  const over = isOverdue(lead.followUpDate) && !['converted','lost'].includes(lead.stage);
                  const tod  = isToday(lead.followUpDate)   && !['converted','lost'].includes(lead.stage);
                  const showPicker = movingId === lead.id;
                  return (
                    <div key={lead.id}
                      draggable
                      onDragStart={e => { e.dataTransfer.effectAllowed = 'move'; setDragging(lead); }}
                      onDragEnd={() => { setDragging(null); setDragOver(null); }}
                      onTouchStart={e => { touchLead.current = lead; touchStage.current = null; }}
                      onTouchMove={e => {
                        const t = e.touches[0];
                        const el = document.elementFromPoint(t.clientX, t.clientY);
                        const col = el && el.closest('[data-stage-id]');
                        const sid = col ? col.getAttribute('data-stage-id') : null;
                        if (sid !== touchStage.current) { touchStage.current = sid; setDragOver(sid); }
                      }}
                      onTouchEnd={e => {
                        const tl = touchLead.current;
                        const ts = touchStage.current;
                        if (tl && ts && tl.stage !== ts) {
                          const s = STAGES.find(s => s.id === ts);
                          onStageChange(tl.id, ts);
                          showToast(`${tl.name} → ${s.label}`, 'success');
                        } else if (!ts) {
                          // no drag detected — treat as tap to edit
                          onEdit(tl);
                        }
                        touchLead.current = null; touchStage.current = null;
                        setDragging(null); setDragOver(null);
                      }}
                      onClick={e => { if (!('ontouchstart' in window)) onEdit(lead); }}
                      className={`bg-white rounded-xl border p-3 cursor-grab active:cursor-grabbing
                        hover:shadow-md transition-all duration-150 select-none
                        ${dragging?.id === lead.id ? 'drag-active shadow-lg' : 'shadow-sm'}
                        ${over ? 'border-red-200 bg-red-50' : tod ? 'border-amber-200 bg-amber-50' : 'border-slate-200'}`}>

                      <div className="flex items-center gap-2 mb-2">
                        <Avatar name={lead.name} size="sm" />
                        <div className="min-w-0">
                          <div className="text-sm font-semibold text-slate-800 truncate">{lead.name}</div>
                          <div className="text-xs text-slate-400 truncate">{lead.source}</div>
                        </div>
                      </div>

                      {lead.campaign && (
                        <div className="text-xs text-slate-500 truncate mb-1.5">📣 {lead.campaign}</div>
                      )}

                      {lead.followUpDate && !['converted','lost'].includes(lead.stage) && (
                        <div className={`text-xs mb-1.5 font-medium ${over ? 'text-red-600' : tod ? 'text-amber-600' : 'text-slate-400'}`}>
                          {over ? `⚠ Vencido ${fmtDate(lead.followUpDate)}` : tod ? '📅 Contactar hoy' : `🗓 ${fmtDate(lead.followUpDate)}`}
                        </div>
                      )}

                      {lead.value > 0 && (
                        <div className="text-xs text-emerald-700 font-semibold mb-2">
                          💰 ${Number(lead.value).toLocaleString('es')}
                        </div>
                      )}

                      <div className="flex items-center justify-between mt-1">
                        <ContactBtns lead={lead} />
                        <div className="flex items-center gap-1">
                          {/* Mover stage button — visible on touch devices */}
                          <button
                            onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); setMovingId(showPicker ? null : lead.id); touchLead.current = null; touchStage.current = null; }}
                            onClick={e => { e.stopPropagation(); setMovingId(showPicker ? null : lead.id); }}
                            title="Mover a etapa"
                            className="text-xs text-indigo-500 hover:bg-indigo-50 px-1.5 py-1 rounded-lg transition-colors border border-indigo-200 font-bold">
                            ⇄
                          </button>
                          {stage.id !== 'converted' && stage.id !== 'lost' && (
                            <button
                              onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); onStageChange(lead.id, 'converted'); showToast(`🎉 ${lead.name} convertido!`, 'success'); }}
                              onClick={e => { e.stopPropagation(); onStageChange(lead.id, 'converted'); showToast(`🎉 ${lead.name} convertido!`, 'success'); }}
                              title="Marcar convertido"
                              className="text-xs text-emerald-600 hover:bg-emerald-50 px-2 py-1 rounded-lg transition-colors font-semibold border border-emerald-200">
                              ✓
                            </button>
                          )}
                          <button
                            onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); if (window.confirm(`¿Eliminar a "${lead.name}"?`)) onDelete(lead.id); }}
                            onClick={e => { e.stopPropagation(); if (window.confirm(`¿Eliminar a "${lead.name}"?`)) onDelete(lead.id); }}
                            title="Eliminar lead"
                            className="text-slate-300 hover:text-red-500 hover:bg-red-50 w-6 h-6 flex items-center justify-center rounded-lg transition-colors text-base leading-none border border-transparent hover:border-red-200">
                            🗑
                          </button>
                        </div>
                      </div>

                      {/* Stage picker — se abre al tocar ⇄ */}
                      {showPicker && (
                        <div className="mt-2 pt-2 border-t border-slate-100">
                          <p className="text-xs text-slate-400 mb-1.5 font-medium">Mover a:</p>
                          <div className="flex flex-wrap gap-1">
                            {STAGES.filter(s => s.id !== lead.stage).map(s => (
                              <button key={s.id}
                                onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); onStageChange(lead.id, s.id); showToast(`${lead.name} → ${s.label}`, 'success'); setMovingId(null); touchLead.current = null; }}
                                onClick={e => { e.stopPropagation(); onStageChange(lead.id, s.id); showToast(`${lead.name} → ${s.label}`, 'success'); setMovingId(null); }}
                                className={`text-xs px-2 py-1 rounded-lg border font-semibold transition-colors ${s.pill}`}>
                                {s.label}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}

                {stageLeads.length === 0 && (
                  <div className={`text-center py-10 text-xs text-slate-400 rounded-xl border-2 border-dashed transition-all
                    ${isTarget ? 'border-indigo-400 text-indigo-500' : 'border-slate-200'}`}>
                    {isTarget ? '¡Soltá aquí!' : 'Sin leads en esta etapa'}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════ REMINDERS ══════════════════════════ */

function RemindersView({ leads, onEdit }) {
  const overdue  = leads.filter(l => isOverdue(l.followUpDate) && !['converted','lost'].includes(l.stage))
                        .sort((a, b) => a.followUpDate.localeCompare(b.followUpDate));
  const todayArr = leads.filter(l => isToday(l.followUpDate)   && !['converted','lost'].includes(l.stage));
  const upcoming = leads.filter(l => { const d = daysUntil(l.followUpDate); return d !== null && d > 0 && d <= 7 && !['converted','lost'].includes(l.stage); })
                        .sort((a, b) => a.followUpDate.localeCompare(b.followUpDate));
  const later    = leads.filter(l => { const d = daysUntil(l.followUpDate); return d !== null && d > 7 && !['converted','lost'].includes(l.stage); })
                        .sort((a, b) => a.followUpDate.localeCompare(b.followUpDate));
  const noDate   = leads.filter(l => !l.followUpDate && !['converted','lost'].includes(l.stage));

  const Card = ({ lead, urgency }) => {
    const d = daysUntil(lead.followUpDate);
    const meta = {
      overdue:  { bg:'bg-red-50 border-red-200',    text:'text-red-600',    label: d !== null ? `⚠ Vencido hace ${Math.abs(d)} día${Math.abs(d)!==1?'s':''}` : '⚠ Vencido' },
      today:    { bg:'bg-amber-50 border-amber-200', text:'text-amber-700',  label: '📅 Contactar hoy' },
      upcoming: { bg:'bg-blue-50 border-blue-200',   text:'text-blue-600',   label: `🗓 En ${d} día${d!==1?'s':''}` },
      later:    { bg:'bg-slate-50 border-slate-200', text:'text-slate-500',  label: `🗓 ${fmtDate(lead.followUpDate)}` },
      nodate:   { bg:'bg-slate-50 border-slate-200', text:'text-slate-400',  label: 'Sin fecha asignada' },
    }[urgency] || {};

    return (
      <div onClick={() => onEdit(lead)}
        className={`flex items-center gap-4 p-4 rounded-xl border ${meta.bg} cursor-pointer hover:shadow-md transition-all`}>
        <div className="w-10 h-10 rounded-full bg-white border-2 border-indigo-200 text-indigo-700 flex items-center justify-center text-sm font-bold flex-shrink-0">
          {lead.name.charAt(0)}
        </div>
        <div className="flex-1 min-w-0">
          <div className="font-semibold text-slate-800">{lead.name}</div>
          <div className={`text-xs font-medium mt-0.5 ${meta.text}`}>{meta.label}</div>
          {lead.campaign && <div className="text-xs text-slate-400 mt-0.5 truncate">📣 {lead.campaign}</div>}
          {lead.notes && <div className="text-xs text-slate-400 mt-0.5 truncate italic">"{lead.notes}"</div>}
        </div>
        <div className="flex flex-col items-end gap-2 flex-shrink-0">
          <StagePill stageId={lead.stage} sm />
          <ContactBtns lead={lead} />
        </div>
      </div>
    );
  };

  const Section = ({ title, items, urgency, empty }) => (
    <div>
      <h3 className="font-semibold text-slate-700 mb-3 flex items-center gap-2">
        {title}
        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${items.length > 0 && urgency === 'overdue' ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
          {items.length}
        </span>
      </h3>
      {items.length === 0
        ? <p className="text-sm text-slate-400 bg-white border rounded-xl p-4">{empty}</p>
        : <div className="space-y-2">{items.map(l => <Card key={l.id} lead={l} urgency={urgency} />)}</div>
      }
    </div>
  );

  return (
    <div className="p-4 sm:p-6 anim-fade max-w-3xl">
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-slate-800">Recordatorios y Seguimientos</h1>
        <p className="text-sm text-slate-500 mt-0.5">No pierdas ninguna oportunidad — contactá a tus leads a tiempo</p>
      </div>

      {overdue.length > 0 && (
        <div className="mb-6 p-4 rounded-xl bg-red-50 border border-red-200 flex items-start gap-3">
          <span className="text-2xl mt-0.5">🚨</span>
          <div>
            <div className="font-bold text-red-700">¡Acción requerida ahora!</div>
            <div className="text-sm text-red-600 mt-0.5">
              Tenés <strong>{overdue.length} lead{overdue.length !== 1 ? 's' : ''}</strong> con seguimiento vencido.
              Cada hora que pasa es menor probabilidad de conversión.
            </div>
          </div>
        </div>
      )}

      <div className="space-y-8">
        <Section title="🚨 Vencidos"         items={overdue}  urgency="overdue"  empty="✓ Sin seguimientos vencidos" />
        <Section title="📅 Para hoy"          items={todayArr} urgency="today"    empty="Sin seguimientos programados para hoy" />
        <Section title="📆 Próximos 7 días"   items={upcoming} urgency="upcoming" empty="Sin seguimientos esta semana" />
        <Section title="🗓 Más adelante"       items={later}    urgency="later"    empty="Sin seguimientos programados" />
        <Section title="📋 Sin fecha asignada" items={noDate}   urgency="nodate"   empty="Todos los leads activos tienen fecha de seguimiento" />
      </div>
    </div>
  );
}

/* ═══════════════════════════ REPORTS ═══════════════════════════ */

function buildReport(leads, days) {
  const since = new Date(); since.setDate(since.getDate() - days);
  const sinceISO = since.toISOString().split('T')[0];
  const prev = new Date(); prev.setDate(prev.getDate() - days * 2);
  const prevISO = prev.toISOString().split('T')[0];

  const period = leads.filter(l => (l.createdAt || '') >= sinceISO);
  const prevPeriod = leads.filter(l => (l.createdAt || '') >= prevISO && (l.createdAt || '') < sinceISO);

  const total     = period.length;
  const prevTotal = prevPeriod.length;
  const converted = period.filter(l => l.stage === 'converted').length;
  const lost      = period.filter(l => l.stage === 'lost').length;
  const active    = period.filter(l => !['converted','lost'].includes(l.stage)).length;
  const convRate  = total ? Math.round(converted / total * 100) : 0;
  const lostRate  = total ? Math.round(lost / total * 100) : 0;
  const potValue  = period.filter(l => l.stage !== 'lost').reduce((s,l) => s+(+l.value||0), 0);
  const wonValue  = period.filter(l => l.stage === 'converted').reduce((s,l) => s+(+l.value||0), 0);
  const trend     = prevTotal > 0 ? Math.round((total - prevTotal) / prevTotal * 100) : null;
  const overdue   = period.filter(l => isOverdue(l.followUpDate) && !['converted','lost'].includes(l.stage)).length;
  const avgValue  = converted > 0 ? Math.round(wonValue / converted) : 0;

  const byStage = STAGES.map(s => ({
    ...s, count: period.filter(l => l.stage === s.id).length,
    pct: total ? Math.round(period.filter(l => l.stage === s.id).length / total * 100) : 0,
  }));

  const srcMap = {};
  period.forEach(l => { if (l.source) srcMap[l.source] = (srcMap[l.source]||0)+1; });
  const bySrc = Object.entries(srcMap).sort((a,b) => b[1]-a[1]);

  // ── AI-style analysis ──────────────────────────────────────────
  const periodLabel = days === 7 ? 'semana' : days === 15 ? 'quincena' : 'mes';
  let rating, ratingEmoji, ratingBg;
  if      (convRate >= 20) { rating = 'Excelente';          ratingEmoji = '🏆'; ratingBg = 'bg-emerald-50 border-emerald-200 text-emerald-800'; }
  else if (convRate >= 12) { rating = 'Muy bueno';           ratingEmoji = '✅'; ratingBg = 'bg-blue-50 border-blue-200 text-blue-800'; }
  else if (convRate >= 6)  { rating = 'Regular';             ratingEmoji = '📊'; ratingBg = 'bg-yellow-50 border-yellow-200 text-yellow-800'; }
  else if (total === 0)    { rating = 'Sin actividad';        ratingEmoji = '😴'; ratingBg = 'bg-slate-50 border-slate-200 text-slate-600'; }
  else                     { rating = 'Necesita atención';   ratingEmoji = '⚠️'; ratingBg = 'bg-red-50 border-red-200 text-red-800'; }

  const bottleneck = byStage.filter(s => !['converted','lost'].includes(s.id)).reduce((m,s) => s.count > m.count ? s : m, { count:0, label:'—' });
  const bestSrc    = bySrc[0];

  let summary;
  if (total === 0) {
    summary = `No se registraron leads en los últimos ${days} días. Revisá las campañas de captación activas y asegurate de que el webhook de Make está funcionando correctamente.`;
  } else {
    const trendTxt = trend === null ? '' : trend > 0 ? `, un ${trend}% más que el período anterior 📈` : trend < 0 ? `, un ${Math.abs(trend)}% menos que el período anterior 📉` : ', igual que el período anterior';
    summary = `En los últimos ${days} días captaste ${total} lead${total!==1?'s':''}${trendTxt}. De ellos, ${converted} se convirtier${converted!==1?'on':'ó'} en clientes (${convRate}%)${wonValue > 0 ? ` generando $${wonValue.toLocaleString('es')} en ventas cerradas` : ''}. Hay ${active} lead${active!==1?'s':''} activos con un valor potencial de $${potValue.toLocaleString('es')}.`;
  }

  const positives = [];
  if (convRate >= 15) positives.push(`Tasa de conversión del ${convRate}% — por encima del promedio del sector (10-15%).`);
  if (trend !== null && trend > 10) positives.push(`Crecimiento del ${trend}% en volumen de leads vs. período anterior.`);
  if (wonValue > 0) positives.push(`$${wonValue.toLocaleString('es')} en ventas cerradas durante este período.`);
  if (bestSrc) positives.push(`"${bestSrc[0]}" es tu mejor fuente con ${bestSrc[1]} lead${bestSrc[1]!==1?'s':''}.`);
  if (overdue === 0 && total > 0) positives.push('Todos los seguimientos están al día — excelente gestión.');
  if (positives.length === 0) positives.push('El sistema está activo y registrando leads correctamente.');

  const issues = [];
  if (overdue > 0) issues.push(`${overdue} lead${overdue!==1?'s tienen':' tiene'} seguimiento vencido — cada día reduce las chances de cerrar.`);
  if (lostRate > 30) issues.push(`Alta tasa de pérdida (${lostRate}%): ${lost} leads descartados. Revisar el proceso de calificación.`);
  if (bottleneck.count > 2) issues.push(`Embudo congestionado en "${bottleneck.label}" con ${bottleneck.count} leads sin avanzar.`);
  if (convRate < 5 && total > 3) issues.push(`Conversión del ${convRate}% es baja. Evaluar calidad de leads entrantes y proceso de venta.`);
  if (trend !== null && trend < -20) issues.push(`Caída del ${Math.abs(trend)}% en leads — revisá el rendimiento de tus campañas.`);
  if (issues.length === 0 && total > 0) issues.push('No se detectaron problemas críticos en este período.');
  if (issues.length === 0 && total === 0) issues.push('Sin leads no hay datos para analizar. Verificá que Make esté enviando los leads al CRM.');

  const recs = [];
  if (overdue > 0) recs.push(`Prioridad #1: contactar hoy los ${overdue} lead${overdue!==1?'s':''} con seguimiento vencido.`);
  if (bottleneck.count > 1) recs.push(`Agendar llamadas para los ${bottleneck.count} leads estancados en "${bottleneck.label}".`);
  if (active > 0) recs.push(`Hay $${potValue.toLocaleString('es')} en el pipeline activo. Enfocate en cerrarlos antes de captar nuevos.`);
  if (bySrc.length > 1) recs.push(`Invertí más en "${bestSrc[0]}" y analizá el ROI de las demás fuentes.`);
  if (convRate < 10 && total > 0) recs.push('Revisá el script de ventas y el tiempo de respuesta al primer contacto.');
  if (recs.length === 0) recs.push('Mantené el ritmo actual y registrá cada interacción en el CRM.');

  return { total, prevTotal, trend, converted, lost, active, convRate, lostRate, potValue, wonValue, avgValue, overdue, byStage, bySrc, rating, ratingEmoji, ratingBg, summary, positives: positives.slice(0,3), issues: issues.slice(0,3), recs: recs.slice(0,3) };
}

function AdminView({ showToast }) {
  const [users,    setUsers]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [form,     setForm]     = useState({ username:'', name:'', password:'' });
  const [creating, setCreating] = useState(false);
  const [resetting, setResetting] = useState(null); // username being reset
  const [newPwd,   setNewPwd]   = useState('');
  const HOST = window.location.origin;

  const load = () => {
    setLoading(true);
    fetch('/admin/users').then(r => r.json()).then(data => { setUsers(data); setLoading(false); });
  };

  useEffect(load, []);

  const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleCreate = async e => {
    e.preventDefault();
    if (!form.username || !form.name || !form.password) return;
    setCreating(true);
    const res  = await fetch('/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(form) });
    const data = await res.json();
    if (data.ok) {
      showToast(`Usuario "${form.name}" creado`, 'success');
      setForm({ username:'', name:'', password:'' });
      load();
    } else {
      showToast(data.error || 'Error al crear usuario', 'error');
    }
    setCreating(false);
  };

  const handleDelete = async username => {
    if (!confirm(`¿Eliminar al usuario "${username}" y todos sus datos?`)) return;
    const res = await fetch(`/admin/users/${username}`, { method:'DELETE' });
    const data = await res.json();
    if (data.ok) { showToast('Usuario eliminado', 'info'); load(); }
    else showToast(data.error, 'error');
  };

  const handleResetPwd = async username => {
    if (!newPwd.trim()) return;
    const res  = await fetch(`/admin/users/${username}/reset-password`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ newPassword: newPwd }) });
    const data = await res.json();
    if (data.ok) { showToast(`Contraseña de "${username}" cambiada`, 'success'); setResetting(null); setNewPwd(''); }
    else showToast(data.error, 'error');
  };

  const inputCls = "w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400";

  return (
    <div className="p-4 sm:p-6 anim-fade max-w-4xl">
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-slate-800">Panel de Administración</h1>
        <p className="text-sm text-slate-500 mt-0.5">Gestioná los accesos de tus clientes al CRM</p>
      </div>

      {/* Create user form */}
      <div className="bg-white border rounded-2xl p-6 mb-6">
        <h2 className="font-semibold text-slate-700 mb-4">➕ Crear nuevo cliente</h2>
        <form onSubmit={handleCreate} className="grid grid-cols-1 sm:grid-cols-3 gap-3 items-end">
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Nombre del cliente</label>
            <input value={form.name} onChange={e => setF('name', e.target.value)} className={inputCls} placeholder="Ej: H Group" required />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Usuario (login)</label>
            <input value={form.username} onChange={e => setF('username', e.target.value.toLowerCase().replace(/\s/g,''))} className={inputCls} placeholder="hgroup" required />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Contraseña</label>
            <input value={form.password} onChange={e => setF('password', e.target.value)} className={inputCls} placeholder="Contraseña segura" required />
          </div>
          <div className="col-span-full flex justify-end">
            <button type="submit" disabled={creating}
              className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl text-sm font-bold transition-colors disabled:opacity-60">
              {creating ? 'Creando...' : '✓ Crear cliente'}
            </button>
          </div>
        </form>
      </div>

      {/* 30-day summary */}
      {users.filter(u => u.role === 'client').length > 0 && (
        <div className="bg-white border rounded-2xl p-6 mb-6">
          <h2 className="font-semibold text-slate-700 mb-1">📈 Leads últimos 30 días</h2>
          <p className="text-xs text-slate-400 mb-4">Leads ingresados por cliente en el último mes</p>
          <div className="space-y-3">
            {users.filter(u => u.role === 'client').map(u => {
              const maxVal = Math.max(...users.filter(x => x.role === 'client').map(x => x.leadsLast30 || 0), 1);
              const pct = Math.round(((u.leadsLast30 || 0) / maxVal) * 100);
              return (
                <div key={u.username} className="flex items-center gap-3">
                  <div className="w-7 h-7 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-xs font-bold flex-shrink-0">
                    {u.name.charAt(0)}
                  </div>
                  <span className="text-sm font-medium text-slate-700 w-32 truncate">{u.name}</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-2.5 overflow-hidden">
                    <div className="h-full rounded-full bg-indigo-500 transition-all duration-700" style={{ width: `${pct}%` }} />
                  </div>
                  <span className="text-sm font-bold text-slate-700 w-10 text-right">{u.leadsLast30 || 0}</span>
                  <span className="text-xs text-slate-400 w-20">de {u.leadsCount} total</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Users table */}
      <div className="bg-white border rounded-2xl overflow-hidden">
        <div className="px-6 py-4 border-b flex items-center justify-between">
          <h2 className="font-semibold text-slate-700">Clientes activos</h2>
          <span className="text-xs text-slate-400">{users.filter(u => u.role === 'client').length} clientes</span>
        </div>
        {loading ? (
          <div className="py-12 text-center text-slate-400">Cargando...</div>
        ) : (
          <div className="overflow-x-auto">
          <table className="w-full text-sm min-w-[600px]">
            <thead>
              <tr className="bg-slate-50 border-b">
                <th className="text-left px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Cliente</th>
                <th className="text-left px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Usuario</th>
                <th className="text-left px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Leads</th>
                <th className="text-left px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Webhook Make</th>
                <th className="px-5 py-3"></th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {users.map(u => (
                <tr key={u.username} className="hover:bg-slate-50 transition-colors">
                  <td className="px-5 py-3">
                    <div className="flex items-center gap-2.5">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${u.role==='admin' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700'}`}>
                        {u.name.charAt(0)}
                      </div>
                      <div>
                        <div className="font-semibold text-slate-800">{u.name}</div>
                        <div className={`text-xs px-1.5 py-0.5 rounded inline-block mt-0.5 ${u.role==='admin' ? 'bg-indigo-50 text-indigo-600' : 'bg-emerald-50 text-emerald-600'}`}>
                          {u.role === 'admin' ? '⚙ Admin' : '👤 Cliente'}
                        </div>
                      </div>
                    </div>
                  </td>
                  <td className="px-5 py-3 font-mono text-sm text-slate-600">{u.username}</td>
                  <td className="px-5 py-3">
                    <span className="bg-slate-100 text-slate-700 text-xs font-bold px-2.5 py-1 rounded-full">{u.leadsCount}</span>
                  </td>
                  <td className="px-5 py-3">
                    {u.webhookKey ? (
                      <div className="flex items-center gap-2">
                        <code className="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded truncate max-w-52">
                          /api/webhook/{u.webhookKey}
                        </code>
                        <button onClick={() => { navigator.clipboard.writeText(`${HOST}/api/webhook/${u.webhookKey}`); showToast('URL copiada', 'success'); }}
                          className="text-xs text-indigo-600 hover:underline whitespace-nowrap">
                          Copiar
                        </button>
                      </div>
                    ) : <span className="text-slate-400 text-xs">—</span>}
                  </td>
                  <td className="px-5 py-3">
                    <div className="flex items-center gap-2 justify-end">
                      {resetting === u.username ? (
                        <div className="flex gap-1 items-center">
                          <input value={newPwd} onChange={e => setNewPwd(e.target.value)} placeholder="Nueva contraseña"
                            className="border rounded-lg px-2 py-1 text-xs w-36 focus:outline-none focus:ring-1 focus:ring-indigo-400" />
                          <button onClick={() => handleResetPwd(u.username)} className="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded hover:bg-amber-200">✓</button>
                          <button onClick={() => { setResetting(null); setNewPwd(''); }} className="text-xs text-slate-400 px-1">✕</button>
                        </div>
                      ) : (
                        <button onClick={() => setResetting(u.username)} className="text-xs text-slate-400 hover:text-amber-600 transition-colors px-2 py-1 rounded hover:bg-amber-50">
                          🔑 Cambiar pwd
                        </button>
                      )}
                      {u.role !== 'admin' && (
                        <button onClick={() => handleDelete(u.username)} className="text-xs text-slate-300 hover:text-red-500 transition-colors px-2 py-1 rounded hover:bg-red-50">
                          Eliminar
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════ APP ════════════════════════════════ */

function App() {
  const [leads,      setLeads]      = useState(loadLeads);
  const [view,       setView]       = useState('dashboard');
  const [modal,      setModal]      = useState(undefined);
  const [toast,      setToast]      = useState(null);
  const [syncing,    setSyncing]    = useState(false);
  const [lastSync,   setLastSync]   = useState(null);
  const [me,         setMe]         = useState(null);
  const [menuOpen,   setMenuOpen]   = useState(false);
  const [appReady,   setAppReady]   = useState(false);

  const showToast = (msg, type = 'info') => setToast({ msg, type, id: Date.now() });

  // Fetch current user info (role determines what they see)
  useEffect(() => {
    fetch('/api/me').then(r => r.json()).then(data => {
      if (data.username) {
        setMe(data);
        if (data.role === 'admin') setView('admin');
      }
    }).catch(() => {}).finally(() => setAppReady(true));
  }, []);

  // Pull leads from server (called on mount + every 30s to catch Make webhook leads)
  const syncFromServer = useCallback(async (silent = false) => {
    if (!silent) setSyncing(true);
    try {
      const serverLeads = await api.getLeads();
      setLeads(serverLeads);
      cacheLeads(serverLeads);
      setLastSync(new Date().toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' }));
    } catch {
      // Server unreachable — stay with cached data
    } finally {
      if (!silent) setSyncing(false);
    }
  }, []);

  useEffect(() => {
    syncFromServer();
    const interval = setInterval(() => syncFromServer(true), 30000);
    return () => clearInterval(interval);
  }, [syncFromServer]);

  const openEdit   = lead => setModal(lead);
  const closeModal = () => setModal(undefined);

  const handleSave = async lead => {
    const isEdit = leads.some(l => l.id === lead.id);
    // Optimistic UI update
    setLeads(ls => isEdit ? ls.map(l => l.id === lead.id ? lead : l) : [lead, ...ls]);
    cacheLeads(isEdit ? leads.map(l => l.id === lead.id ? lead : l) : [lead, ...leads]);
    showToast(isEdit ? `Lead "${lead.name}" actualizado` : `Lead "${lead.name}" agregado`, 'success');
    closeModal();
    // Persist to server
    try { await api.upsertLead(lead); } catch {}
  };

  const handleDelete = async id => {
    const lead = leads.find(l => l.id === id);
    setLeads(ls => ls.filter(l => l.id !== id));
    showToast(`Lead "${lead?.name}" eliminado`, 'info');
    try { await api.deleteLead(id); } catch {}
  };

  const handleStageChange = async (id, stage) => {
    const updated = leads.map(l => l.id === id ? { ...l, stage } : l);
    setLeads(updated);
    cacheLeads(updated);
    const lead = updated.find(l => l.id === id);
    try { if (lead) await api.upsertLead(lead); } catch {}
  };

  const isAdmin    = me?.role === 'admin';
  const commonProps = { leads, onEdit: openEdit, onDelete: handleDelete, onStageChange: handleStageChange, showToast };

  const viewLabels = { dashboard:'Dashboard', leads:'Leads', pipeline:'Pipeline', reports:'Informes', reminders:'Recordatorios', admin:'Clientes' };

  // Loading screen while we check the session
  if (!appReady) return (
    <div className="min-h-screen bg-slate-900 flex items-center justify-center">
      <div className="text-center">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style={{width:'56px',height:'56px',borderRadius:'14px',margin:'0 auto 16px'}}>
          <defs>
            <linearGradient id="lbg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#6366f1"/><stop offset="100%" stopColor="#3730a3"/></linearGradient>
            <linearGradient id="lacc2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#a5b4fc"/><stop offset="100%" stopColor="#ffffff"/></linearGradient>
          </defs>
          <rect width="200" height="200" rx="44" fill="url(#lbg2)"/>
          <circle cx="76" cy="52" r="11" fill="white" opacity="0.95"/>
          <circle cx="100" cy="44" r="13" fill="white"/>
          <circle cx="124" cy="52" r="11" fill="white" opacity="0.95"/>
          <path d="M52 80 L148 80 L130 108 L70 108 Z" fill="url(#lacc2)" opacity="0.95"/>
          <path d="M70 112 L130 112 L118 136 L82 136 Z" fill="url(#lacc2)" opacity="0.9"/>
          <path d="M82 140 L118 140 L112 158 L88 158 Z" fill="url(#lacc2)" opacity="0.85"/>
          <path d="M88 162 Q100 182 112 162 L108 158 L92 158 Z" fill="white" opacity="0.9"/>
        </svg>
        <div className="text-white font-semibold text-lg">LAX Group CRM</div>
        <div className="text-slate-400 text-sm mt-1 animate-pulse">Cargando...</div>
      </div>
    </div>
  );

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar view={view} goTo={setView} leads={leads} syncing={syncing} lastSync={lastSync} me={me}
        isOpen={menuOpen} onClose={() => setMenuOpen(false)} isMobileLayout={true} />

      {/* This div takes all remaining width — on mobile sidebar is fixed so this div uses full width */}
      <div className="flex-1 flex flex-col overflow-hidden min-w-0">
        {/* Mobile top bar */}
        <div className="no-print md:hidden flex items-center justify-between px-4 py-3 bg-slate-900 text-white flex-shrink-0 shadow-md">
          <button onClick={() => setMenuOpen(true)} className="text-slate-300 hover:text-white p-1 -ml-1">
            <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div className="flex items-center gap-2">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style={{width:'24px',height:'24px',borderRadius:'6px',display:'block',flexShrink:0}}>
              <defs>
                <linearGradient id="tbg" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stopColor="#6366f1"/>
                  <stop offset="100%" stopColor="#3730a3"/>
                </linearGradient>
                <linearGradient id="tacc" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#a5b4fc"/>
                  <stop offset="100%" stopColor="#ffffff"/>
                </linearGradient>
              </defs>
              <rect width="200" height="200" rx="44" fill="url(#tbg)"/>
              <circle cx="76"  cy="52" r="11" fill="white" opacity="0.95"/>
              <circle cx="100" cy="44" r="13" fill="white"/>
              <circle cx="124" cy="52" r="11" fill="white" opacity="0.95"/>
              <path d="M52 80 L148 80 L130 108 L70 108 Z" fill="url(#tacc)" opacity="0.95"/>
              <path d="M70 112 L130 112 L118 136 L82 136 Z" fill="url(#tacc)" opacity="0.9"/>
              <path d="M82 140 L118 140 L112 158 L88 158 Z" fill="url(#tacc)" opacity="0.85"/>
              <path d="M88 162 Q100 182 112 162 L108 158 L92 158 Z" fill="white" opacity="0.9"/>
            </svg>
            <span className="font-semibold text-sm">{viewLabels[view] || 'LAX Group CRM'}</span>
          </div>
          <div className={`w-2 h-2 rounded-full ${syncing ? 'bg-indigo-400 animate-pulse' : 'bg-emerald-500'}`} />
        </div>

      <main className="flex-1 overflow-y-auto bg-slate-50">
        {view === 'admin'     && <AdminView showToast={showToast} />}
        {view === 'dashboard' && !isAdmin && (
          <Dashboard {...commonProps}
            onOpenNew={() => { setView('leads'); setModal(null); }}
            goTo={setView} />
        )}
        {view === 'leads'     && !isAdmin && <LeadsView     {...commonProps} />}
        {view === 'pipeline'  && !isAdmin && <PipelineView  {...commonProps} />}
        {view === 'reports'   && !isAdmin && <ReportsView   leads={leads} />}
        {view === 'reminders' && !isAdmin && <RemindersView {...commonProps} />}
      </main>

      {/* Modal */}
      {modal !== undefined && (
        <LeadModal lead={modal} onSave={handleSave} onClose={closeModal} />
      )}

      {/* Toast */}
      {toast && (
        <Toast key={toast.id} msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />
      )}
      </div>{/* end flex-1 column */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
